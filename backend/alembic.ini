[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Override via DATABASE_URL env var (read in env.py) or alembic -x dburl=...
# This default is only used when running alembic CLI without DATABASE_URL set.
sqlalchemy.url = sqlite+aiosqlite:///./agent_platform.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
